<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/app-icon.svg">
  <title>Login - WD Manutenções</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <!-- Logo e Header -->
        <div class="brand-header">
            <img src="assets/logo.svg" alt="WD Manutenções" class="brand-logo">
            <h1 class="brand-name">WD MANUTENÇÕES</h1>
            <p class="brand-tagline">Sistema de Controle de Ponto</p>
        </div>

        <!-- Container de Login/Cadastro -->
        <div class="auth-container">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Entrar</button>
                <button class="tab-btn" onclick="showTab('register')">Cadastrar</button>
            </div>

            <!-- Formulário de Login -->
            <div id="loginForm" class="auth-form active">
                <h2>Bem-vindo de volta!</h2>
                <p class="form-subtitle">Entre com suas credenciais</p>

                <div class="form-group">
                    <label for="loginEmail">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="seu@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Senha
                    </label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="••••••••"
                    >
                </div>

                <button onclick="handleLogin()" class="btn btn-primary btn-large">
                    Entrar no Sistema
                </button>

                <div class="admin-link">
                    <a href="admin.html">Acesso Administrativo →</a>
                </div>
            </div>

            <!-- Formulário de Cadastro -->
            <div id="registerForm" class="auth-form">
                <h2>Criar Conta</h2>
                <p class="form-subtitle">Preencha os dados para se cadastrar</p>

                <div class="form-group">
                    <label for="registerName">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        Nome Completo
                    </label>
                    <input 
                        type="text" 
                        id="registerName" 
                        placeholder="Seu nome completo"
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label for="registerEmail">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="registerEmail" 
                        placeholder="seu@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="registerPassword">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Senha
                    </label>
                    <input 
                        type="password" 
                        id="registerPassword" 
                        placeholder="Mínimo 6 caracteres"
                    >
                </div>

                <div class="form-group">
                    <label for="registerConfirmPassword">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Confirmar Senha
                    </label>
                    <input 
                        type="password" 
                        id="registerConfirmPassword" 
                        placeholder="Digite a senha novamente"
                    >
                </div>

                <button onclick="handleRegister()" class="btn btn-primary btn-large">
                    Criar Conta
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2026 WD Manutenções - Todos os direitos reservados</p>
        </div>
    </div>

    <script src="js/pwa.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
