<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFD700">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Ponto — WD Manutenções</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page grid-bg">
<div class="container">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-brand">
      <img src="/assets/logo.svg" alt="WD" class="header-logo">
      <div class="header-title">
        <h1><span>WD</span> Manutenções</h1>
        <p>Controle de Ponto</p>
      </div>
    </div>
    <div class="header-right">
      <div id="connBadge" class="conn-badge online">
        <div class="conn-dot"></div><span>Online</span>
      </div>
      <div class="user-pill">
        <strong id="uName">—</strong>
        <small  id="uEmail">—</small>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- RELÓGIO -->
  <div class="clock-card">
    <div class="clock-date">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="clockDate"></span>
    </div>
    <div id="clockTime" class="clock-time">00<span class="blink">:</span>00<span class="blink">:</span>00</div>
  </div>

  <!-- BOTÃO REGISTRAR -->
  <button onclick="openPunchModal()" class="punch-btn">
    <div class="punch-icon">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <span>REGISTRAR PONTO</span>
  </button>

  <!-- REGISTROS DO DIA -->
  <div class="card">
    <div class="card-top">
      <div class="card-title">REGISTROS DE <span>HOJE</span></div>
    </div>

    <div class="day-summary">
      <div class="day-slot slot-entrada">
        <div class="slot-dot"></div>
        <span class="slot-val" id="slotEntrada">—</span>
        <span class="slot-label">Entrada</span>
      </div>
      <div class="day-slot slot-s-almoco">
        <div class="slot-dot"></div>
        <span class="slot-val" id="slotSAlmoco">—</span>
        <span class="slot-label">S. Almoço</span>
      </div>
      <div class="day-slot slot-r-almoco">
        <div class="slot-dot"></div>
        <span class="slot-val" id="slotRAlmoco">—</span>
        <span class="slot-label">Retorno</span>
      </div>
      <div class="day-slot slot-saida">
        <div class="slot-dot"></div>
        <span class="slot-val" id="slotSaida">—</span>
        <span class="slot-label">Saída</span>
      </div>
    </div>

    <div id="recList" class="records-list">
      <p class="empty-msg">Nenhum registro hoje. Clique acima para começar!</p>
    </div>
  </div>

</div><!-- /container -->

<!-- ═══ MODAL REGISTRAR ═══ -->
<div id="punchModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Registrar Ponto</h2>
      <button class="btn-close" onclick="closePunchModal()">×</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label>Tipo de Registro</label>
        <select id="punchType" class="form-control">
          <option value="entrada">🟢 Entrada</option>
          <option value="saida_almoco">🟡 Saída para Almoço</option>
          <option value="retorno_almoco">🔵 Retorno do Almoço</option>
          <option value="saida">🔴 Saída</option>
        </select>
      </div>

      <div class="cam-wrap">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="photoPreview" class="photo-preview hidden">
          <img id="photoImg" src="" alt="Foto">
        </div>
      </div>

      <div class="cam-controls">
        <button id="btnCapture" onclick="capturePhoto()" class="btn btn-secondary">📷 Capturar Foto</button>
        <button id="btnRetake"  onclick="retakePhoto()"  class="btn btn-secondary hidden">🔄 Nova Foto</button>
      </div>

      <div id="locInfo" class="loc-info">📍 Aguardando localização...</div>

      <button id="btnConfirm" onclick="confirmPunch()" class="btn btn-primary btn-full" disabled>
        ✓ CONFIRMAR REGISTRO
      </button>

    </div>
  </div>
</div>

<!-- SCROLL TOP -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script src="/js/pwa.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
