<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/logo.svg">
    <title>Sistema de Ponto - WD Manutenções</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="screen">
        <div class="container">
            <!-- Header do Sistema -->
            <div class="system-header">
                <div class="header-brand">
                    <img src="assets/logo.svg" alt="WD Manutenções" class="header-logo">
                    <div class="header-text">
                        <h1><span>WD</span> MANUTENÇÕES</h1>
                        <p>Sistema de Controle de Ponto</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="user-info">
                        <strong id="userName">Carregando...</strong>
                        <small id="userEmail"></small>
                    </div>
                    <button onclick="logout()" class="btn-logout">SAIR</button>
                </div>
            </div>

            <!-- Clock -->
            <div class="clock-card">
                <div class="date-display">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span id="currentDate"></span>
                </div>
                <div id="currentTime" class="time-large">00:00:00</div>
            </div>

            <!-- Botão de Registro -->
            <div class="register-section">
                <button onclick="openRegisterModal()" class="btn-register-main">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    <span>REGISTRAR PONTO</span>
                </button>
            </div>

            <!-- Meus Registros -->
            <div class="records-card">
                <h2>MEUS REGISTROS DE HOJE</h2>
                <div id="recordsList" class="records-list">
                    <p class="empty-state">Carregando seus registros...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="registerModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Ponto</h2>
                <button onclick="closeRegisterModal()" class="btn-close">&times;</button>
            </div>
            
            <div class="modal-body">
                <!-- Tipo de Registro -->
                <div class="form-group">
                    <label>Tipo de Registro</label>
                    <select id="recordType" class="form-control">
                        <option value="entrada">🟢 Entrada</option>
                        <option value="saida_almoco">🟡 Saída para Almoço</option>
                        <option value="retorno_almoco">🔵 Retorno do Almoço</option>
                        <option value="saida">🔴 Saída</option>
                    </select>
                </div>

                <!-- Preview da Câmera -->
                <div class="camera-section">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div id="photoPreview" class="photo-preview hidden">
                        <img id="capturedPhoto" src="" alt="Foto capturada">
                    </div>
                </div>

                <!-- Botões de Câmera -->
                <div class="camera-controls">
                    <button onclick="capturePhoto()" id="btnCapture" class="btn btn-secondary">
                        📷 Capturar Foto
                    </button>
                    <button onclick="retakePhoto()" id="btnRetake" class="btn btn-secondary hidden">
                        🔄 Tirar Outra Foto
                    </button>
                </div>

                <!-- Informações de Localização -->
                <div id="locationInfo" class="location-info">
                    <p>📍 Buscando sua localização...</p>
                </div>

                <!-- Botão de Confirmar -->
                <button onclick="confirmRegister()" id="btnConfirm" class="btn btn-primary btn-large" disabled>
                    ✓ CONFIRMAR REGISTRO
                </button>
            </div>
        </div>
    </div>

    <!-- Botões de Scroll -->
    <button class="scroll-to-top" id="scrollToTop" onclick="scrollToTop()" title="Voltar ao topo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <button class="scroll-to-bottom" id="scrollToBottom" onclick="scrollToBottom()" title="Ir para baixo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </button>

    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
