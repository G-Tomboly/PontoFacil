<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Servidor - WD Manutenções</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #FFD700;
            border-bottom: 3px solid #FFD700;
            padding-bottom: 10px;
        }
        .test {
            background: #1a1a1a;
            padding: 20px;
            margin: 20px 0;
            border-left: 5px solid #FFD700;
            border-radius: 5px;
        }
        .success {
            border-left-color: #00ff00;
        }
        .error {
            border-left-color: #ff0000;
            color: #ff0000;
        }
        button {
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px 5px;
        }
        button:hover {
            background: #FFA500;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status.ok {
            background: #00ff00;
            color: #000;
        }
        .status.fail {
            background: #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>🔧 WD MANUTENÇÕES - TESTE DE SERVIDOR</h1>

    <div class="test">
        <h3>1️⃣ Teste de Conexão</h3>
        <button onclick="testConnection()">▶ TESTAR CONEXÃO</button>
        <div id="connectionResult"></div>
    </div>

    <div class="test">
        <h3>2️⃣ Teste de Cadastro</h3>
        <button onclick="testRegister()">▶ TESTAR CADASTRO</button>
        <div id="registerResult"></div>
    </div>

    <div class="test">
        <h3>3️⃣ Teste de Login</h3>
        <button onclick="testLogin()">▶ TESTAR LOGIN</button>
        <div id="loginResult"></div>
    </div>

    <div class="test">
        <h3>4️⃣ Teste de Registro de Ponto (SIMULADO)</h3>
        <button onclick="testRecordPoint()">▶ TESTAR REGISTRO</button>
        <div id="recordResult"></div>
    </div>

    <div class="test">
        <h3>5️⃣ Listar Registros</h3>
        <button onclick="testListRecords()">▶ LISTAR REGISTROS</button>
        <div id="listResult"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let testUserId = null;

        // Teste 1: Conexão
        async function testConnection() {
            const result = document.getElementById('connectionResult');
            result.innerHTML = '<p>⏳ Testando...</p>';
            
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                
                result.innerHTML = `
                    <span class="status ok">✓ SUCESSO</span>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (err) {
                result.innerHTML = `
                    <span class="status fail">✗ FALHOU</span>
                    <p class="error">Erro: ${err.message}</p>
                    <p class="error">⚠️ O servidor está rodando? Execute: npm start</p>
                `;
            }
        }

        // Teste 2: Cadastro
        async function testRegister() {
            const result = document.getElementById('registerResult');
            result.innerHTML = '<p>⏳ Cadastrando usuário de teste...</p>';
            
            const testEmail = `teste_${Date.now()}@wdtest.com`;
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Usuário Teste',
                        email: testEmail,
                        password: '123456'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    testUserId = data.user.id;
                    result.innerHTML = `
                        <span class="status ok">✓ SUCESSO</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                result.innerHTML = `
                    <span class="status fail">✗ FALHOU</span>
                    <p class="error">Erro: ${err.message}</p>
                `;
            }
        }

        // Teste 3: Login
        async function testLogin() {
            const result = document.getElementById('loginResult');
            result.innerHTML = '<p>⏳ Fazendo login...</p>';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@wdmanutencoes.com',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <span class="status ok">✓ SUCESSO</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                result.innerHTML = `
                    <span class="status fail">✗ FALHOU</span>
                    <p class="error">Erro: ${err.message}</p>
                `;
            }
        }

        // Teste 4: Registro de Ponto
        async function testRecordPoint() {
            const result = document.getElementById('recordResult');
            result.innerHTML = '<p>⏳ Registrando ponto simulado...</p>';
            
            if (!testUserId) {
                result.innerHTML = `
                    <span class="status fail">✗ ERRO</span>
                    <p class="error">Execute o teste de CADASTRO primeiro!</p>
                `;
                return;
            }
            
            // Foto simulada (1x1 pixel vermelho em base64)
            const fakePhoto = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8DwHwAFBQIAX8jx0gAAAABJRU5ErkJggg==';
            
            try {
                const response = await fetch(`${API_URL}/record`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: testUserId,
                        user_name: 'Usuário Teste',
                        user_email: 'teste@wdtest.com',
                        type: 'entrada',
                        photo: fakePhoto,
                        latitude: -22.9068,
                        longitude: -43.1729,
                        address: 'Rio de Janeiro, Brasil'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <span class="status ok">✓ SUCESSO</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                result.innerHTML = `
                    <span class="status fail">✗ FALHOU</span>
                    <p class="error">Erro: ${err.message}</p>
                `;
            }
        }

        // Teste 5: Listar Registros
        async function testListRecords() {
            const result = document.getElementById('listResult');
            result.innerHTML = '<p>⏳ Buscando registros...</p>';
            
            try {
                const response = await fetch(`${API_URL}/records`);
                const data = await response.json();
                
                result.innerHTML = `
                    <span class="status ok">✓ SUCESSO</span>
                    <p>Total de registros: ${data.records.length}</p>
                    <pre>${JSON.stringify(data.records, null, 2)}</pre>
                `;
            } catch (err) {
                result.innerHTML = `
                    <span class="status fail">✗ FALHOU</span>
                    <p class="error">Erro: ${err.message}</p>
                `;
            }
        }

        // Auto-teste ao carregar
        window.onload = () => {
            console.log('🧪 Página de testes carregada');
            console.log('API URL:', API_URL);
        };
    </script>
</body>
</html>
